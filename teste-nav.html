<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Teste Nav</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', sans-serif;
      font-weight: 400;
      color: #111;
      background-color: #fff;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    .nav {
      background: #111111;
      border-bottom: 2px solid rgba(232, 184, 74, 0.35);
      padding: 18px 0;
      position: -webkit-sticky;
      position: sticky;
      top: 0;
      z-index: 100;
      transform: translateZ(0);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .nav-logo { color: #fff; font-weight: 900; font-size: 1.2rem; }
    .hamburger { color: #fff; font-size: 1.5rem; }

    .spacer { height: 3000px; background: linear-gradient(#fff, #ddd); padding: 40px; }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <span class="nav-logo">café com campinas</span>
      <span class="hamburger">☰</span>
    </div>
  </nav>
  <div class="spacer">Scroll para testar o nav sticky.</div>
</body>
</html>
