<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Você está dentro! — Café com Campinas</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --gold: #e8b84a;
      --white: #ffffff;
      --gray: #767676;
    }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--black);
      color: var(--white);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .page {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 48px 24px;
      position: relative;
      overflow: hidden;
    }

    .page::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 55% at 50% 40%, rgba(232, 184, 74, 0.10) 0%, transparent 65%);
      pointer-events: none;
    }

    .inner {
      position: relative;
      z-index: 1;
      max-width: 560px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      height: 52px;
      margin-bottom: 48px;
    }

    .check {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(232, 184, 74, 0.12);
      border: 2px solid rgba(232, 184, 74, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
    }

    .check svg {
      width: 28px;
      height: 28px;
      stroke: var(--gold);
    }

    .tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 900;
      letter-spacing: -1.2px;
      line-height: 1.1;
      color: var(--white);
      margin-bottom: 20px;
    }

    h1 em {
      font-style: normal;
      color: var(--gold);
    }

    p {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.65;
      margin-bottom: 48px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: var(--gold);
      color: var(--black);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      border-radius: 6px;
      text-decoration: none;
      transition: background 0.2s;
    }

    .btn:hover { background: #d4a53e; }

    footer {
      padding: 24px;
      text-align: center;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.2);
    }

    footer a {
      color: rgba(255, 255, 255, 0.3);
      text-decoration: none;
    }

    footer a:hover { color: rgba(255, 255, 255, 0.5); }
  </style>
</head>
<body>
  <main class="page">
    <div class="inner">
      <img src="Logo claro.png" alt="Café com Campinas" class="logo" />

      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12" />
        </svg>
      </div>

      <span class="tag">Inscrição confirmada</span>
      <h1>Você está<br /><em>dentro!</em></h1>
      <p>
        Amanhã cedo você recebe a primeira edição — política, cultura,<br />
        economia e cotidiano de Campinas direto no seu e-mail, às 06:10.
      </p>
      <a href="/" class="btn">Voltar para o início</a>
    </div>
  </main>

  <footer>
    © 2026 Café com Campinas ·
    <a href="https://www.instagram.com/cafecomcampinas/" target="_blank" rel="noopener">Instagram</a>
  </footer>
</body>
</html>
